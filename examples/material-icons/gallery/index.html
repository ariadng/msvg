<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>msvg — Material icon loops</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #fafafa;
    --fg: #1c1c1e;
    --muted: #86868b;
    --tile: #ffffff;
    --tile-border: rgba(0, 0, 0, 0.07);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111113;
      --fg: #f2f2f4;
      --muted: #8e8e93;
      --tile: #1c1c1f;
      --tile-border: rgba(255, 255, 255, 0.08);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex;
    min-height: 100dvh;
    flex-direction: column;
  }
  main { flex: 1; width: min(720px, 100% - 2rem); margin: 0 auto; }
  header { padding: 2.5rem 0 1.5rem; }
  h1 { font-size: 1.25rem; font-weight: 650; margin: 0; letter-spacing: -0.01em; }
  header p { margin: 0.35rem 0 0; color: var(--muted); font-size: 0.9rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 0.75rem;
  }
  h2 {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 1.75rem 0 0.75rem;
  }
  section:last-of-type { padding-bottom: 2rem; }
  .tile {
    appearance: none;
    border: 1px solid var(--tile-border);
    background: var(--tile);
    color: inherit;
    border-radius: 14px;
    padding: 1.25rem 0.5rem 0.9rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
    cursor: pointer;
    transition: transform 120ms ease, opacity 120ms ease;
    -webkit-tap-highlight-color: transparent;
  }
  .tile:active { transform: scale(0.96); }
  .tile.paused { opacity: 0.45; }
  .slot { width: 56px; height: 56px; }
  .slot svg { width: 100%; height: 100%; display: block; }
  .label { font-size: 0.78rem; color: var(--muted); }
  footer {
    padding: 1rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.78rem;
  }
  footer a { color: inherit; }
</style>
</head>
<body>
<main>
  <header>
    <h1>msvg &times; Material Symbols</h1>
    <p>Icons animated as MotionSVG packages, looping through the state machine. Tap a tile to pause or resume its loop.</p>
  </header>
  <div id="sections"></div>
</main>
<footer>
  Icons: <a href="https://fonts.google.com/icons">Google Material Symbols</a> (Apache-2.0)
  &middot; <a href="https://simpleicons.org">Simple Icons</a> (CC0; trademarks belong to their owners)
  &middot; Runtime: <a href="https://github.com/ariadng/msvg">msvg</a>
  &middot; honors reduced-motion
</footer>

<script type="importmap">
{
  "imports": {
    "msvg-core": "/vendor/msvg-core/index.js",
    "msvg-schema": "/vendor/msvg-schema/index.js"
  }
}
</script>
<script type="module">
  import { createMsvg } from "msvg-core";

  const sectionsHost = document.querySelector("#sections");
  const sections = await fetch("/sections.json").then((r) => r.json());

  async function loadPackage(base, id) {
    const [config, targets, timelines, states, svgMarkup] = await Promise.all([
      fetch(`${base}/${id}/animation.config.json`).then((r) => r.json()),
      fetch(`${base}/${id}/motion/targets.json`).then((r) => r.json()),
      fetch(`${base}/${id}/motion/timelines.json`).then((r) => r.json()),
      fetch(`${base}/${id}/motion/states.json`).then((r) => r.json()),
      fetch(`${base}/${id}/assets/main.svg`).then((r) => r.text()),
    ]);
    return { config, targets, timelines, states, svgMarkup };
  }

  for (const section of sections) {
    const el = document.createElement("section");
    const h2 = document.createElement("h2");
    h2.textContent = section.title;
    const grid = document.createElement("div");
    grid.className = "grid";
    el.append(h2, grid);
    sectionsHost.append(el);

    for (const id of section.icons) {
      const tile = document.createElement("button");
      tile.className = "tile";
      tile.setAttribute("aria-label", `${id} — tap to pause or resume`);
      const slot = document.createElement("div");
      slot.className = "slot";
      const label = document.createElement("span");
      label.className = "label";
      label.textContent = id.replace(/-/g, " ");
      tile.append(slot, label);
      grid.append(tile);

      loadPackage(section.base, id)
        .then((animation) => {
          const controller = createMsvg({ container: slot, animation });
          controller.send("LOAD");
          tile.addEventListener("click", () => {
            const looping = controller.getState() === "loading";
            controller.send(looping ? "RESET" : "LOAD");
            tile.classList.toggle("paused", looping);
          });
        })
        .catch((err) => {
          label.textContent = `${id}: failed to load`;
          console.error(id, err);
        });
    }
  }
</script>
</body>
</html>
